<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATAM · Autos · Financial Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--purple:#533AB7;--green:#1D9E75;
  --blue-light:#E6F1FB;--purple-light:#F0ECFC;--green-light:#E8F5EE;
  --card:#fff;--bg:#F2F2F0;--border:rgba(0,0,0,0.08);
  --text:#1a1a1a;--muted:#888;--faint:#bbb;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}

/* HEADER */
.header{
  background:#fff;border-bottom:1px solid var(--border);
  padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.04)
}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:32px;height:32px;background:linear-gradient(135deg,#185FA5,#533AB7);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.header-title{font-size:14px;font-weight:700;letter-spacing:-.01em}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.01em}
.tag-q1{background:var(--purple-light);color:var(--purple)}
.tag-q2{background:var(--blue-light);color:var(--blue)}
.tag-live{background:#EAF3DE;color:#2E5B0A;display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;background:#3B8A1E;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* FILTER BAR */
.filterbar{
  background:#FAFAFA;border-bottom:1px solid var(--border);
  padding:9px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end
}
.fg{display:flex;flex-direction:column;gap:2px}
.fg label{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.fg select{
  font-size:11px;padding:5px 8px;border-radius:6px;border:1px solid #ddd;
  background:#fff;color:#111;cursor:pointer;max-width:150px;
  font-family:'DM Sans',sans-serif;
  transition:border-color .15s;
}
.fg select:hover{border-color:#aaa}
.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.1)}
.fg select:disabled{background:#f5f5f5;color:#aaa;cursor:not-allowed}
.reset-btn{
  padding:5px 13px;font-size:11px;border-radius:6px;border:1px solid #ddd;
  background:#fff;cursor:pointer;color:#555;font-family:'DM Sans',sans-serif;font-weight:500;
  transition:all .15s;align-self:flex-end
}
.reset-btn:hover{background:#f0f0f0;border-color:#bbb}

/* TABS */
.tabs{
  display:flex;background:#fff;border-bottom:2px solid var(--border);
  padding:0 20px;overflow-x:auto;gap:2px
}
.tab{
  padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);white-space:nowrap;
  flex-shrink:0;margin-bottom:-2px;transition:all .15s;letter-spacing:.01em
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* PAGES */
.page{display:none;padding:16px 20px}.page.active{display:block}

/* QUARTER STRIP */
.q-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.q-card{
  background:var(--card);border-radius:10px;padding:14px 15px;
  border:1px solid var(--border);position:relative;overflow:hidden
}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.q1-accent::before{background:var(--purple)}
.q2-accent::before{background:var(--blue)}
.ytd-accent::before{background:var(--green)}
.q-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;opacity:.8}
.q-val{font-size:19px;font-weight:700;letter-spacing:-.02em;line-height:1}
.q-sub{font-size:10px;color:var(--muted);margin-top:4px}
.q-meta{font-size:10px;color:var(--faint);margin-top:5px;line-height:1.5}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-bottom:14px}
.kc{
  background:var(--card);border-radius:10px;padding:12px 14px;
  border:1px solid var(--border);transition:box-shadow .15s
}
.kc:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700}
.kc-val{font-size:19px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-.02em}
.kc-sub{font-size:10px;color:var(--faint);margin-top:3px}
.kc-badge{
  display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:4px;margin-top:5px;letter-spacing:.01em
}
.up{background:#EAF3DE;color:#2E5B0A}.dn{background:#FCEAEA;color:#8B1A1A}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.chart-box{
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  padding:14px;overflow:hidden
}
.chart-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}

.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:10px;color:var(--muted);width:30px;text-align:right;flex-shrink:0;font-family:'DM Mono',monospace}
.bar-track{flex:1;background:#F0F0EE;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:700;color:#fff;min-width:3px;transition:width .3s ease}
.bar-val{font-size:10px;color:#555;width:55px;flex-shrink:0;text-align:right;font-family:'DM Mono',monospace}
.q-divider{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--faint);letter-spacing:.06em;margin:7px 0 4px;padding-left:38px}

/* MATRIX */
.matrix-wrap{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:auto;margin-bottom:14px}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px}
table{width:100%;border-collapse:collapse}
thead tr{background:#F6F6F6;position:sticky;top:0;z-index:2}
th{padding:8px 10px;font-size:9px;font-weight:700;color:#555;text-align:right;border-bottom:1px solid #EBEBEB;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
th.left{text-align:left}
th.q1h{background:#F2EDFD;color:var(--purple)}
th.q2h{background:#EAF1FB;color:var(--blue)}
th.toth{background:#EBF6F1;color:var(--green)}
td{padding:6px 10px;font-size:11px;border-bottom:1px solid #F4F4F4;text-align:right;white-space:nowrap;font-family:'DM Mono',monospace}
td.kpi-name{text-align:left;font-weight:500;color:var(--text);font-size:11px;padding-left:20px;font-family:'DM Sans',sans-serif}
td.grp{
  background:#F8F8F8;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:#555;padding:8px 10px;text-align:left;font-family:'DM Sans',sans-serif
}
td.q1c{background:#FDFBFF}
td.totc{background:#F5FAF7;font-weight:600}
td.plan{color:#C8C8C8}
.pup{color:#2E5B0A;font-weight:600}.pdn{color:#8B1A1A;font-weight:600}

/* TRENDS */
.spark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.spark-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 14px;transition:box-shadow .15s}
.spark-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.spark-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.spark-val{font-size:16px;font-weight:700;margin-top:3px;letter-spacing:-.02em}
.spark-chg{font-size:10px;margin-top:2px;font-weight:600}
.spark-bars{display:flex;align-items:flex-end;gap:2px;height:32px;margin-top:10px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}
.spark-mo{display:flex;justify-content:space-between;margin-top:3px}
.spark-mo span{font-size:9px;color:var(--faint)}

/* DIVISION */
.div-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.div-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px}
.div-title{font-size:12px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #F0F0F0;letter-spacing:-.01em}
.div-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #F8F8F8}
.div-row:last-child{border-bottom:none}
.div-row span:first-child{color:var(--muted)}
.div-row span:last-child{font-weight:600;font-family:'DM Mono',monospace}

/* EMPTY */
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:12px}

@media(max-width:580px){
  .chart-row,.div-grid,.spark-grid,.q-strip{grid-template-columns:1fr}
  .header{padding:10px 14px}
  .filterbar{padding:8px 14px}
  .page{padding:12px 14px}
}
</style>
</head>

// ── FORMATTERS ────────────────────────────────────────────────────────────
const f$=(v,d=1)=>{if(v==null||isNaN(v))return'—';const a=Math.abs(v),s=v<0?'-':'';return a>=1e9?s+'$'+(a/1e9).toFixed(d)+'B':a>=1e6?s+'$'+(a/1e6).toFixed(d)+'M':a>=1e3?s+'$'+(a/1e3).toFixed(0)+'K':s+'$'+Math.round(a).toLocaleString();};
const fn=v=>v==null?'—':Math.round(v).toLocaleString();
const fp=v=>v==null?'—':(v>=0?'+':'')+((v||0)*100).toFixed(1)+'%';
const pct=v=>v==null?'—':(v>=0?'+':'')+(v||0).toFixed(1)+'%';
const pc=(v)=>v==null?'':(v>=0?'pup':'pdn');
const bdg=(v)=>{if(v==null)return'';const g=v>=0;return`<span class="kc-badge ${g?'up':'dn'}">${g?'▲':'▼'} ${fp(v)}</span>`;};

// ── FILTERS ───────────────────────────────────────────────────────────────
function unique(a){return[...new Set(a)].filter(Boolean).sort();}
function setOpts(id,vals,cur,labelFn){const s=document.getElementById(id);s.innerHTML=`<option value="">All</option>`+vals.map(v=>`<option value="${v}"${v==cur?' selected':''}>${labelFn?labelFn(v):v}</option>`).join('');}

// ── COUNTRY SWITCH ────────────────────────────────────────────────────────
function activeHier(){return document.getElementById('fCountry').value==='GUATEMALA'?GT_HIER:HIER;}
function activeMonthly(){return document.getElementById('fCountry').value==='GUATEMALA'?GT_MONTHLY:MONTHLY;}
function switchCountry(){
  // Reset all date + hierarchy filters on country change
  ['fDiv','fReg','fDist','fDM','fBrand','fYear','fQ','fMonth'].forEach(id=>document.getElementById(id).value='');
  // Repopulate Division filter options
  const hier=activeHier();
  const divs=unique(hier.map(x=>x.div));
  const fDiv=document.getElementById('fDiv');
  fDiv.innerHTML=`<option value="">All Divisions</option>`+divs.map(v=>`<option>${v}</option>`).join('');
  // Repopulate Year filter (must run before cascade -> cascadeDate)
  initDateFilters();
}

// ── HIERARCHY CASCADE ──────────────────────────────────────────────────────
function cascade(){
  const hier=activeHier();
  const d=document.getElementById('fDiv').value;
  const r=document.getElementById('fReg').value;
  setOpts('fReg',unique(hier.filter(x=>!d||x.div===d).map(x=>x.reg)),r);
  const r2=document.getElementById('fReg').value;
  setOpts('fDist',unique(hier.filter(x=>(!d||x.div===d)&&(!r2||x.reg===r2)).map(x=>x.dist)),document.getElementById('fDist').value);
  const di=document.getElementById('fDist').value;
  setOpts('fDM',unique(hier.filter(x=>(!d||x.div===d)&&(!r2||x.reg===r2)&&(!di||x.dist===di)).map(x=>x.dm)),document.getElementById('fDM').value);
  setOpts('fBrand',unique(hier.filter(x=>!d||x.div===d).map(x=>x.brand)),document.getElementById('fBrand').value);
  cascadeDate();
}

// ── DATE CASCADE: Year → Quarter → Month ──────────────────────────────────
function initDateFilters(){
  const years=unique(activeMonthly().map(r=>String(r.yr)));
  setOpts('fYear',years,document.getElementById('fYear').value,v=>v);
  cascadeDate();
}
function cascadeDate(){
  const yr=document.getElementById('fYear').value;
  const q=document.getElementById('fQ').value;

  // Quarters available for selected year
  const mon=activeMonthly();
  const qOpts=unique(mon.filter(r=>!yr||String(r.yr)===yr).map(r=>r.q));
  setOpts('fQ',qOpts,q,v=>{
    const rows=mon.filter(r=>r.q===v);
    if(!rows.length)return v;
    const yrs=[...new Set(rows.map(r=>r.yr))];
    return `${v} FY${yrs[0]}${yrs.length>1?'–'+yrs[yrs.length-1]:''}`;
  });
  const q2=document.getElementById('fQ').value;

  // Months available for selected year+quarter
  const mOpts=mon.filter(r=>(!yr||String(r.yr)===yr)&&(!q2||r.q===q2));
  const mVals=mOpts.map(r=>String(r.m)+'-'+r.yr); // unique key: "10-2025"
  const curM=document.getElementById('fMonth').value;
  const sel=document.getElementById('fMonth');
  sel.innerHTML=`<option value="">All Months</option>`+mOpts.map(r=>{
    const key=String(r.m)+'-'+r.yr;
    return`<option value="${key}"${key===curM?' selected':''}>${r.mn} ${r.yr}</option>`;
  }).join('');

  render();
}

function resetFilters(){
  ['fDiv','fReg','fDist','fDM','fBrand','fYear','fQ','fMonth'].forEach(id=>document.getElementById(id).value='');
  switchCountry();
}
function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function getRows(){
  const d=document.getElementById('fDiv').value;
  const yr=document.getElementById('fYear').value;
  const q=document.getElementById('fQ').value;
  const mo=document.getElementById('fMonth').value; // "m-yr" e.g. "10-2025"
  const isGT=document.getElementById('fCountry').value==='GUATEMALA';
  let rows=activeMonthly().filter(r=>{
    if(yr&&String(r.yr)!==yr)return false;
    if(q&&r.q!==q)return false;
    if(mo&&(String(r.m)+'-'+r.yr)!==mo)return false;
    return true;
  });
  if(isGT)return rows; // Guatemala has no division split data
  if(d){
    rows=rows.map(r=>{
      const dRow=DIV_DATA.find(x=>x.m===r.m&&x.yr===r.yr&&x.div===d);
      if(!dRow)return r;
      const ratio=r.plo>0?dRow.plo/r.plo:0;
      const nRatio=r.nlmN>0?dRow.nlmN/r.nlmN:0;
      return{...r,plo:dRow.plo,psc:dRow.psc,sales:dRow.sales,netRev:dRow.netRev,nlmN:dRow.nlmN,delta:dRow.delta,stores:dRow.stores,
        nlmD:Math.round(r.nlmD*nRatio),cogs:Math.round(r.cogs*ratio),sgp:Math.round(r.sgp*ratio),pbo:Math.round(r.pbo*ratio),
        ploPlan:Math.round(r.ploPlan*ratio),pscPlan:r.pscPlan?Math.round(r.pscPlan*ratio):null,
        salesPlan:r.salesPlan?Math.round(r.salesPlan*ratio):null,netRevPlan:r.netRevPlan?Math.round(r.netRevPlan*ratio):null};
    });
  }
  return rows;
}

function aggAll(rows){
  if(!rows.length)return null;
  const s=k=>rows.reduce((a,r)=>a+(r[k]||0),0);
  const last=rows[rows.length-1];
  return{plo:last.plo,ploPlan:last.ploPlan,psc:s('psc'),
    pscPlan:rows.filter(r=>r.pscPlan).reduce((a,r)=>a+(r.pscPlan||0),0)||null,
    sales:s('sales'),salesPlan:rows.filter(r=>r.salesPlan).reduce((a,r)=>a+(r.salesPlan||0),0)||null,
    cogs:s('cogs'),sgp:s('sgp'),netRev:s('netRev'),
    netRevPlan:rows.filter(r=>r.netRevPlan).reduce((a,r)=>a+(r.netRevPlan||0),0)||null,
    nlmN:s('nlmN'),nlmD:s('nlmD'),stores:last.stores,delta:s('delta'),
    deltaPlan:rows.filter(r=>r.deltaPlan).reduce((a,r)=>a+(r.deltaPlan||0),0)||null,pbo:last.pbo};
}

function render(){
  const rows=getRows();
  const a=aggAll(rows);
  if(!a)return;
  renderOverview(a,rows);
  renderMatrix(rows);
  renderTrends(rows);
  renderDivision();
}

      <div class="q-sub">Net Revenue</div>
      <div class="q-meta">PLO ${f$(r.plo,2)} &nbsp;·&nbsp; PSC ${f$(r.psc,1)} &nbsp;·&nbsp; NLM# ${fn(r.nlmN)}</div>

  const ytd=aggAll(rows);

  document.getElementById('overview').innerHTML=`

      <div class="q-sub">Net Revenue</div>
      <div class="q-meta">PLO ${f$(ytd?ytd.plo:0,2)} &nbsp;·&nbsp; PSC ${f$(ytd?ytd.psc:0,1)} &nbsp;·&nbsp; NLM# ${fn(ytd?ytd.nlmN:0)}</div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kc"><div class="kc-label">PLO</div><div class="kc-val">${f$(a.plo,2)}</div><div class="kc-sub">Plan: ${f$(a.ploPlan,2)}</div>${bdg(ploVsP)}</div>

function barChart(title,rows,key,c1,c2,isN){
  const mx=Math.max(...rows.map(r=>Math.abs(r[key]||0)));
  let lastQ='';
  const bars=rows.map(r=>{
    const v=r[key]||0,w=mx>0?Math.round(Math.abs(v)/mx*100):0;
    const c=r.q==='Q1'?c1:c2;
    let qDiv='';
    if(r.q!==lastQ){qDiv=`<div class="q-divider">${r.q} FY2026</div>`;lastQ=r.q;}
    return`${qDiv}<div class="bar-row">
      <div class="bar-lbl">${r.mn.slice(0,3)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c}">${w>18?(isN?fn(v):f$(v,1)):''}</div></div>
      <div class="bar-val">${isN?fn(v):f$(v,1)}</div>
    </div>`;
  }).join('');
  return`<div class="chart-box">
    <div class="chart-title">
      ${title}
      <span style="font-size:9px;font-weight:500;color:var(--faint);display:flex;align-items:center;gap:4px">
        <span class="legend-dot" style="background:${c1}"></span>Q1
        <span class="legend-dot" style="background:${c2};margin-left:3px"></span>Q2
      </span>
    </div>
    ${bars}
  </div>`;
}

function renderMatrix(rows){
  const KPIS=[
    {grp:'PAWN & LOAN',kpi:'PLO',              k:'plo',        f:f$, tot:'last'},
    {grp:'',           kpi:'PLO Plan',          k:'ploPlan',    f:f$, tot:'last',dim:true},
    {grp:'',           kpi:'PLO vs Plan %',     k:'ploVsP',     f:fp, tot:'—',  pct:true},
    {grp:'',           kpi:'PLO vs LY %',       k:'ploVsLY',    f:v=>pct(v), tot:'—', pct:true, raw:true},
    {grp:'',           kpi:'PSC',               k:'psc',        f:f$, tot:'sum'},
    {grp:'',           kpi:'PSC Plan',          k:'pscPlan',    f:f$, tot:'sum', dim:true},
    {grp:'',           kpi:'PSC vs Plan %',     k:'pscVsP',     f:fp, tot:'—',  pct:true},
    {grp:'',           kpi:'PSC vs LY %',       k:'pscVsLY',    f:v=>pct(v), tot:'—', pct:true, raw:true},
    {grp:'',           kpi:'PBO',               k:'pbo',        f:f$, tot:'last'},
    {grp:'',           kpi:'NLM #',             k:'nlmN',       f:fn, tot:'sum'},
    {grp:'',           kpi:'NLM $',             k:'nlmD',       f:f$, tot:'sum'},
    {grp:'',           kpi:'# Stores',          k:'stores',     f:fn, tot:'last'},
    {grp:'SALES & MARGIN',kpi:'Sales',          k:'sales',      f:f$, tot:'sum'},
    {grp:'',           kpi:'Sales Plan',        k:'salesPlan',  f:f$, tot:'sum', dim:true},
    {grp:'',           kpi:'Sales vs Plan %',   k:'salesVsP',   f:fp, tot:'—',  pct:true},
    {grp:'',           kpi:'Sales vs LY %',     k:'salesVsLY',  f:v=>pct(v), tot:'—', pct:true, raw:true},
    {grp:'',           kpi:'COGS',              k:'cogs',       f:f$, tot:'sum'},
    {grp:'',           kpi:'SGP',               k:'sgp',        f:f$, tot:'sum'},
    {grp:'',           kpi:'Net Revenue',       k:'netRev',     f:f$, tot:'sum'},
    {grp:'',           kpi:'Net Rev Plan',      k:'netRevPlan', f:f$, tot:'sum', dim:true},
    {grp:'',           kpi:'Net Rev vs Plan %', k:'netRevVsP',  f:fp, tot:'—',  pct:true},
    {grp:'DELTA',      kpi:'Delta',             k:'delta',      f:f$, tot:'sum'},
    {grp:'',           kpi:'Delta Plan',        k:'deltaPlan',  f:f$, tot:'sum', dim:true},
  ];

  const q1rows=rows.filter(r=>r.q==='Q1'),q2rows=rows.filter(r=>r.q==='Q2');
  const hasQ1=q1rows.length>0,hasQ2=q2rows.length>0,hasBoth=hasQ1&&hasQ2;

  let colH='<th class="left" style="min-width:160px">KPI</th>';
  let lastQ='';
  rows.forEach(r=>{
    const border=r.q!==lastQ?`border-left:2px solid ${r.q==='Q1'?'#c9bef0':'#b8d9f5'}`:'';
    colH+=`<th class="${r.q==='Q1'?'q1h':'q2h'}" style="${border}">${r.mn.slice(0,3)}</th>`;
    lastQ=r.q;
  });
  if(hasBoth) colH+=`<th class="q1h">Q1 Total</th>`;
  if(hasQ2)   colH+=`<th class="q2h">Q2 Total</th>`;
  colH+=`<th class="toth">YTD</th>`;

  const calc=(rws,k,tot)=>{
    if(!rws.length||tot==='—')return null;
    const vals=rws.map(r=>r[k]).filter(v=>v!=null);
    if(!vals.length)return null;
    if(tot==='sum')return vals.reduce((a,b)=>a+b,0);
    if(tot==='last')return rws[rws.length-1][k];
    return null;
  };

  let tbody='';let lastG='';
  KPIS.forEach(k=>{
    if(k.grp&&k.grp!==lastG){
      const span=rows.length+(hasBoth?1:0)+(hasQ2?1:0)+2;
      tbody+=`<tr><td class="grp" colspan="${span}">${k.grp}</td></tr>`;
      lastG=k.grp;
    }
    let lastQ2='';
    const cells=rows.map(r=>{
      const v=r[k.k];const disp=v==null?'—':k.f(k.raw?v/100:v);
      const cls=k.pct?pc(k.raw?v/100:v):'';
      const border=r.q!==lastQ2&&rows.indexOf(r)>0?`style="border-left:2px solid ${r.q==='Q1'?'#ede8fc':'#ddeef9'}"`:' ';
      lastQ2=r.q;
      return`<td class="${r.q==='Q1'?'q1c':''} ${k.dim?'plan':''} ${cls}" ${border}>${disp}</td>`;
    }).join('');

    const q1v=hasBoth?calc(q1rows,k.k,k.tot):null;
    const q2v=hasQ2?calc(q2rows,k.k,k.tot):null;
    const ytdv=calc(rows,k.k,k.tot);
    const fmt=v=>v==null||k.tot==='—'?'—':k.f(k.raw?v/100:v);
    const tc=v=>k.pct&&v!=null?pc(k.raw?v/100:v):'';

    tbody+=`<tr><td class="kpi-name ${k.dim?'plan':''}">${k.kpi}</td>${cells}`;
    if(hasBoth) tbody+=`<td class="q1c totc ${tc(q1v)}">${fmt(q1v)}</td>`;
    if(hasQ2)   tbody+=`<td class="totc ${tc(q2v)}">${fmt(q2v)}</td>`;
    tbody+=`<td class="totc ${tc(ytdv)}">${fmt(ytdv)}</td></tr>`;
  });

  document.getElementById('matrix').innerHTML=`
    <div class="sec-title">KPI Matrix — FY2026 · Mexico · Autos · ${document.getElementById('fDiv').value||'All Divisions'}</div>
    <div class="matrix-wrap"><table><thead><tr>${colH}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

function renderTrends(rows){
  const metrics=[
    {k:'plo',   l:'PLO',        c1:'#533AB7',c2:'#185FA5'},
    {k:'psc',   l:'PSC',        c1:'#7B5EA7',c2:'#4A90D9'},

    {k:'cogs',  l:'COGS',       c1:'#c44820',c2:'#D85A30'},
    {k:'sgp',   l:'SGP',        c1:'#3a6610',c2:'#639922'},
    {k:'netRev',l:'Net Revenue',c1:'#0a4d2e',c2:'#0F6E56'},
    {k:'nlmN',  l:'NLM #',      c1:'#6b3a0a',c2:'#BA7517'},
    {k:'nlmD',  l:'NLM $',      c1:'#5c2e06',c2:'#854F0B'},
    {k:'delta', l:'Delta',      c1:'#2a2070',c2:'#3C3489'},
  ];
  const cards=metrics.map(m=>{
    const vals=rows.map(r=>r[m.k]||0);
    const mx=Math.max(...vals.map(Math.abs));
    const latest=vals[vals.length-1];
    const prev=vals.length>1?vals[vals.length-2]:null;
    const chg=prev&&prev!==0?(latest-prev)/Math.abs(prev):null;
    const bars=rows.map(r=>{
      const v=r[m.k]||0;
      const h=mx>0?Math.max(3,Math.round(Math.abs(v)/mx*30)):3;
      const c=r.q==='Q1'?m.c1:m.c2;
      return`<div class="spark-b" style="height:${h}px;background:${v<0?'#E24B4A':c}"></div>`;
    }).join('');
    return`<div class="spark-card">
      <div class="spark-lbl">${m.l}</div>
      <div class="spark-val">${m.k==='nlmN'?fn(latest):f$(latest,1)}</div>
      ${chg!=null?`<div class="spark-chg ${chg>=0?'pup':'pdn'}">${chg>=0?'▲':'▼'} ${Math.abs(chg*100).toFixed(1)}% vs prev month</div>`:''}
      <div class="spark-bars">${bars}</div>
      <div class="spark-mo">${rows.map(r=>`<span>${r.mn.slice(0,3)}</span>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('trends').innerHTML=`
    <div class="sec-title" style="margin-bottom:12px">
      Month-over-month trends
      <span style="font-size:9px;font-weight:500;color:var(--faint);margin-left:8px">
        ■ Q1 (darker) &nbsp; ■ Q2 (lighter)
      </span>
    </div>
    <div class="spark-grid">${cards}</div>`;
}

let usingLiveData = false;
const liveCache   = {};

async function fetchLive(country) {
  if (liveCache[country]) return liveCache[country];
  const dax = country === 'GUATEMALA' ? buildGuatemalaDax() : buildMexicoDax();
  const resp = await fetch('/api/pbi-query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ daxQuery: dax })
  });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const rows = await resp.json();
  const mapped = rows
    .map(country === 'GUATEMALA' ? mapLiveRowGuatemala : mapLiveRowMexico)
    .filter(Boolean);
  liveCache[country] = mapped;
  return mapped;
}

window.switchCountry = async function() {
  _switchCountry();
  if (!usingLiveData) return;
  const country = document.getElementById('fCountry').value;
  try {
    const live = await fetchLive(country);
    if (country === 'GUATEMALA') {
      GT_MONTHLY.splice(0, GT_MONTHLY.length, ...live);
    } else {
      MONTHLY.splice(0, MONTHLY.length, ...live);
    }
    render();
  } catch(e) {
    console.warn('Live refresh failed, using cached data', e);
  }
};

// ── INIT ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    // Try to fetch live Mexico data first (default country)
    const liveMX = await fetchLive('MEXICO');
    MONTHLY.splice(0, MONTHLY.length, ...liveMX);
    usingLiveData = true;
    console.info('✅ Live Power BI data loaded successfully');
    // Prefetch Guatemala in background
    fetchLive('GUATEMALA').then(liveGT => {
      GT_MONTHLY.splice(0, GT_MONTHLY.length, ...liveGT);
    }).catch(() => {});
  } catch(e) {
    console.warn('⚠️ Live data unavailable — using cached data. Reason:', e.message);
    usingLiveData = false;
  }
  switchCountry();
})();
</script>
